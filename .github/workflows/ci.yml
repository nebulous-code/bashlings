name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  verify-puzzles:
    name: verify puzzles (podman)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman --version
      - run: bash scripts/ci-verify-puzzles.sh
